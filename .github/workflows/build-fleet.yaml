name: Build fleet images

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ARM64
    steps:
      - run: |
          cd /home/neuvector/kyledong/build_test/neuvector

          cd neuvector
          make fleet
          cd ..

          cp neuvector/Makefile .
          cp neuvector/build/dockerignore .dockerignore
          make ctrl_image
          make enf_image
          docker tag neuvector/enforcer:latest nvpublic/en:kdong
      -
        name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: nvpublic/en:kdong
